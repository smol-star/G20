name: G20 Trends Auto Scraper

on:
  schedule:
    # 매시 13분에 실행 (정각 혼잡 회피, GitHub Actions 서버 부하 분산)
    - cron: '13 * * * *'
  # Enable manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (Pull code)
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Execute Background Scripts
        run: |
          # UTC 15:00 = KST 00:00 (자정). 크론이 :13분에 실행되므로 15시를 체크.
          current_hour=$(date -u +%H)
          
          if [ "$current_hour" == "15" ]; then
            echo "Running Midnight Archive Task (KST 00:13)..."
            python run_midnight.py
          fi
          
          echo "Running Hourly Fetch Task..."
          python fetcher.py
          
      - name: Commit and Push Data Updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Auto-update trends data & archives [skip ci]" || echo "No changes to commit"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
