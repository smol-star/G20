name: G20 Trends Auto Scraper

on:
  schedule:
    # 3시간마다 :23분에 실행 (BQ 프로젝트 :17분과 겹치지 않게 배치)
    - cron: '23 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Execute Scripts
        run: |
          # UTC 15:00 = KST 00:23 (자정). 15시 실행분이 자정 아카이브를 담당.
          current_hour=$(date -u +%H)
          
          if [ "$current_hour" == "15" ]; then
            echo "Running Midnight Archive Task (KST ~00:23)..."
            python run_midnight.py
          fi
          
          echo "Running RSS AI Fetch Task..."
          python fetcher.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Commit and Push Data Updates
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "RSS-AI: Auto-update trends data [skip ci]" || echo "No changes to commit"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
